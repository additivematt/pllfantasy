<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Stats Interrogator | PLL Fantasy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // ── Service Worker Registration ────────────────────────────────────────
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('[SW] Registered, scope:', reg.scope))
                .catch(err => console.warn('[SW] Registration failed:', err));


            // Listen for messages from the service worker
            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data?.type === 'SERVER_REACHABLE') {
                    showStatus('🟢 ONLINE', '#48bb78');
                } else if (event.data?.type === 'SERVER_UNREACHABLE') {
                    showStatus('⚡ OFFLINE — using cached data', '#ecc94b');
                }
            });
        }

        // Status pill helper (looks up element dynamically as it runs in head)
        function showStatus(text, color) {
            const statusEl = document.getElementById('cacheStatus');
            if (statusEl) {
                statusEl.textContent = text;
                statusEl.style.display = 'inline-block';
                statusEl.style.background = color + '22';
                statusEl.style.color = color;
                statusEl.style.border = '1px solid ' + color + '55';
            }
        }
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="pll-text">PLL</span>
                <span class="logo-main">INTERROGATA</span>
                <span class="subtitle">Deep dive player analytics</span>
            </div>
            <div id="cacheStatus" style="display:inline-block; font-size:0.7rem; font-weight:700; letter-spacing:1px; padding:4px 10px; border-radius:20px; align-self:center; background: rgba(72, 187, 120, 0.12); color: #48bb78; border: 1px solid rgba(72, 187, 120, 0.25);">🟢 ONLINE</div>
            <div class="selectors">
                <div class="selector-group">
                    <label for="teamFilter">Team</label>
                    <select id="teamFilter">
                        <option value="ALL">All Teams</option>
                        <option value="ARC">Archers</option>
                        <option value="ATL">Atlas</option>
                        <option value="CAN">Cannons</option>
                        <option value="CHA">Chaos</option>
                        <option value="OUT">Outlaws</option>
                        <option value="RED">Redwoods</option>
                        <option value="WAT">Waterdogs</option>
                        <option value="WHP">Whipsnakes</option>
                    </select>
                </div>
                <div class="selector-group">
                    <label for="posFilter">Position</label>
                    <select id="posFilter">
                        <option value="ALL">All Positions</option>
                        <option value="A">Attack</option>
                        <option value="M">Midfield</option>
                        <option value="D">Defense</option>
                        <option value="LSM">LSM</option>
                        <option value="G">Goalie</option>
                        <option value="FO">Faceoff</option>
                        <option value="SSDM">SSDM</option>
                    </select>
                </div>
                <div class="selector-group" style="flex-direction: row; align-items: center; gap: 8px;">
                    <input type="checkbox" id="activeOnly" checked style="width: auto;">
                    <label for="activeOnly" style="margin-bottom: 0;">Active Players Only (2025/26)</label>
                </div>
                <div class="selector-group">
                    <label for="playerSearch">Player</label>
                    <select id="playerSearch">
                        <option value="">Select Player</option>
                    </select>
                </div>
                <div class="selector-group">
                    <label for="yearSelect">Target Year</label>
                    <select id="yearSelect">
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <div class="selector-group">
                    <label for="weekSelect">Target Week</label>
                    <select id="weekSelect">
                        <option value="">Select Week</option>
                        <option value="1">Week 1</option>
                        <option value="2" selected>Week 2</option>
                        <option value="3">Week 3</option>
                    </select>
                </div>
            </div>
        </header>

        <main>
            <section class="player-overview glass-card">
                <div class="player-info">
                    <div class="avatar" id="playerAvatar">JT</div>
                    <div>
                        <h1 id="playerName">Jeff Teat</h1>
                        <p id="playerMeta">#7 | Attack | New York Atlas</p>
                    </div>
                </div>
                <div class="quick-stats">
                    <div class="stat-item">
                        <span class="label">Avg FP</span>
                        <span class="value" id="avgFP">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Total Points</span>
                        <span class="value" id="totalPoints">--</span>
                    </div>
                </div>
            </section>

            <section class="chart-section glass-card">
                <h2>Fantasy Performance Trend</h2>
                <div class="chart-container">
                    <canvas id="fantasyChart"></canvas>
                </div>
            </section>

            <section class="matchup-focus glass-card" id="matchupFocus">
                <h2>Matchup Context</h2>
                <div id="opponentInfo" class="opponent-highlight">
                    <p>Select a week to see opponent analysis.</p>
                </div>
                <div id="historicalMatchups" class="historical-list">
                    <!-- Matchup items will be injected here -->
                </div>
            </section>

            <section class="game-log-section glass-card">
                <h2>Detailed Game Log</h2>
                <div class="table-container">
                    <table id="gameLogTable">
                        <thead id="gameLogHeader">
                            <tr>
                                <th>Season</th>
                                <th>Event</th>
                                <th>Opponent</th>
                                <th>Cost</th>
                                <th>FP</th>
                                <th>G</th>
                                <th>A</th>
                                <th>CT</th>
                                <th>TO</th>
                                <th>GB</th>
                                <th>T</th>
                                <th>Matchup</th>
                            </tr>
                        </thead>
                        <tbody id="gameLogBody">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
